<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>學生聯絡簿產生器</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23fffefa'/%3E%3Ccircle cx='26' cy='36' r='15' fill='%23e8702a'/%3E%3Cellipse cx='40' cy='25' rx='10' ry='12' fill='%232d987b' transform='rotate(-15 40 25)'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <rect x="9" y="9" width="11" height="11" rx="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </symbol>
      <symbol id="icon-dice" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="3"></rect>
        <circle cx="8" cy="8" r="1.2"></circle>
        <circle cx="16" cy="8" r="1.2"></circle>
        <circle cx="12" cy="12" r="1.2"></circle>
        <circle cx="8" cy="16" r="1.2"></circle>
        <circle cx="16" cy="16" r="1.2"></circle>
      </symbol>
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="m22 2-7 20-4-9-9-4Z"></path>
        <path d="M22 2 11 13"></path>
      </symbol>
      <symbol id="icon-sparkles" viewBox="0 0 24 24">
        <path d="M12 3 9.8 8.8 4 11l5.8 2.2L12 19l2.2-5.8L20 11l-5.8-2.2Z"></path>
        <path d="m19 3 .8 2.2L22 6l-2.2.8L19 9l-.8-2.2L16 6l2.2-.8Z"></path>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="M20 6 9 17l-5-5"></path>
      </symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24">
        <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"></path>
        <path d="M12 9v4"></path>
        <path d="M12 17h.01"></path>
      </symbol>
    </svg>

    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <span class="orange-dot"></span>
            <span class="apple-dot"></span>
          </div>
          <div>
            <h1>學生聯絡簿產生器</h1>
            <p>快速整理課堂紀錄，包含驗收問題與學習表現</p>
          </div>
        </div>
        <div class="provider-strip" id="providerStrip" aria-live="polite"></div>
      </header>

      <section class="workspace" aria-label="聯絡簿產生器">
        <aside class="panel config-panel">
          <div class="panel-heading">
            <h2>基本資料</h2>
            <span id="lessonPreviewLabel">L2</span>
          </div>

          <div class="field">
            <label for="studentName">學生姓名</label>
            <input id="studentName" type="text" autocomplete="off" placeholder="學生" />
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="courseCode">課程</label>
              <select id="courseCode"></select>
            </div>
            <div class="field">
              <label for="lessonCode">課次</label>
              <select id="lessonCode"></select>
            </div>
          </div>

          <div class="lesson-preview" id="lessonPreview"></div>

          <div class="field">
            <label for="displayCourse">聯絡簿課程名稱</label>
            <select id="displayCourse"></select>
          </div>

          <div class="field">
            <label for="displayLesson">聯絡簿堂數</label>
            <input id="displayLesson" type="number" min="1" max="45" inputmode="numeric" />
          </div>

          <fieldset class="field">
            <legend>進度狀態</legend>
            <div class="segmented" role="radiogroup" aria-label="進度狀態">
              <label>
                <input type="radio" name="schedule" value="fixed" checked />
                <span>進度正常</span>
              </label>
              <label>
                <input type="radio" name="schedule" value="makeup" />
                <span>進度落後</span>
              </label>
            </div>
          </fieldset>

          <div class="toggle-list">
            <label class="toggle-row">
              <input id="hasPrevious" type="checkbox" />
              <span>上週未完成</span>
            </label>
            <label class="toggle-row">
              <input id="useAI" type="checkbox" checked />
              <span>AI 潤飾</span>
            </label>
          </div>

          <div class="suggestion-block">
            <div class="section-title">驗收問題建議</div>
            <div class="field-grid">
              <div class="field">
                <label for="drawCourseCode">抽題課程</label>
                <select id="drawCourseCode"></select>
              </div>
              <div class="field">
                <label for="drawLessonCode">抽題課次</label>
                <select id="drawLessonCode"></select>
              </div>
            </div>
            <textarea id="standaloneQuestions" rows="5" placeholder="先抽三題，再貼到本堂或上週欄位"></textarea>
            <div class="button-row compact-actions">
              <button class="secondary" type="button" id="drawStandaloneBtn">
                <svg><use href="#icon-dice"></use></svg>
                獨立抽三題
              </button>
              <button class="ghost" type="button" id="pasteCurrentBtn">貼到本堂</button>
              <button class="ghost" type="button" id="pastePreviousBtn">貼到上週</button>
              <button class="icon-button" type="button" id="copyStandaloneBtn" aria-label="複製抽題內容" title="複製">
                <svg><use href="#icon-copy"></use></svg>
              </button>
            </div>
          </div>
        </aside>

        <section class="panel compose-panel">
          <div class="panel-heading">
            <h2>課堂紀錄</h2>
            <span>本堂驗收問題會保留在輸出中</span>
          </div>

          <div class="field">
            <label for="performance">學習表現</label>
            <textarea id="performance" rows="6" placeholder="可簡短描述學生今天的操作、理解、互動或需要提醒的地方"></textarea>
          </div>

          <div class="field with-action">
            <div class="label-action">
              <label for="questions">本堂課驗收問題</label>
              <button class="secondary" type="button" id="drawCurrentBtn">
                <svg><use href="#icon-dice"></use></svg>
                抽三題帶入
              </button>
            </div>
            <textarea id="questions" rows="8" placeholder="可自行輸入，或依課程與課次抽三題"></textarea>
          </div>

          <div class="field with-action">
            <div class="label-action">
              <label for="previousQuestions">上週進度驗收問題</label>
              <button class="secondary" type="button" id="drawPreviousBtn">
                <svg><use href="#icon-dice"></use></svg>
                抽上一課帶入
              </button>
            </div>
            <textarea id="previousQuestions" rows="7" placeholder="勾選上週未完成後，這裡會出現在聯絡簿開頭"></textarea>
          </div>
        </section>

        <aside class="panel output-panel">
          <div class="panel-heading">
            <h2>產出預覽</h2>
            <span id="aiResultMeta">尚未產生</span>
          </div>

          <div class="result-box" id="resultBox" tabindex="0" aria-live="polite">
            <p class="empty-state">填完資料後按下產生，內容會顯示在這裡。</p>
          </div>

          <div class="output-actions">
            <button class="primary" type="button" id="generateBtn">
              <svg><use href="#icon-send"></use></svg>
              產生聯絡簿
            </button>
            <button class="secondary" type="button" id="copyResultBtn">
              <svg><use href="#icon-copy"></use></svg>
              複製
            </button>
          </div>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
